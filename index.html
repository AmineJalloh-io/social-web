<!DOCTYPE html><html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Mini Social App</title>
<style>
body {font-family: Arial; margin:0; background:#f0f2f5;}
header {background:#1877f2; color:white; padding:15px; text-align:center; font-size:24px;}
.container {max-width:600px; margin:20px auto;}
.card {background:white; padding:15px; border-radius:10px; margin-bottom:15px; box-shadow:0 2px 5px rgba(0,0,0,0.1);} 
textarea {width:100%; padding:10px; border-radius:8px; border:1px solid #ccc;}
button {background:#1877f2; color:white; border:none; padding:10px 15px; border-radius:8px; cursor:pointer; margin-top:10px;}
.post {margin-top:10px;}
.like-btn {background:#eee; color:#333; margin-top:5px;}
</style>
</head>
<body><header>My Social Media</header><div class="container"><!-- Post Form --><div class="card">
<h3>Create Post</h3>
<form action="https://formspree.io/f/xzzekvlr" method="POST" id="postForm">
<textarea name="message" placeholder="What's on your mind?" required></textarea>
<button type="submit">Post</button>
</form>
</div><!-- Posts Feed --><div id="feed"></div></div><script>
const form = document.getElementById('postForm');
const feed = document.getElementById('feed');

// Load saved posts
window.onload = () => {
  const posts = JSON.parse(localStorage.getItem('posts')) || [];
  posts.reverse().forEach(addPostToDOM);
}

form.addEventListener('submit', function(e){
  e.preventDefault();
  const text = form.message.value;

  const post = {
    text: text,
    likes: 0
  };

  let posts = JSON.parse(localStorage.getItem('posts')) || [];
  posts.push(post);
  localStorage.setItem('posts', JSON.stringify(posts));

  addPostToDOM(post);
  form.reset();

  // Send to Formspree
  fetch(form.action, {
    method: "POST",
    body: new FormData(form),
    headers: { 'Accept': 'application/json' }
  });
});

function addPostToDOM(post) {
  const div = document.createElement('div');
  div.className = 'card';

  div.innerHTML = `
    <div class="post">${post.text}</div>
    <button class="like-btn">Like (${post.likes})</button>
  `;

  const btn = div.querySelector('.like-btn');
  btn.addEventListener('click', () => {
    post.likes++;
    btn.textContent = `Like (${post.likes})`;
  });

  feed.prepend(div);
}
</script></body>
</html>
